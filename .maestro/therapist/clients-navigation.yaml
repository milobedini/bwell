appId: host.exp.Exponent
---
# Therapist Clients Navigation
# Navigates to "Your clients" and "All patients" screens and back via header back button.

# -- Navigate to Your clients --
- tapOn: 'Your clients'
- waitForAnimationToEnd
- assertVisible: 'Your clients'

# -- Go back via header back button --
- tapOn:
    id: 'BackButton'
- waitForAnimationToEnd
- assertVisible: 'Your clients'
- assertVisible: 'All patients'

# -- Navigate to All patients --
- tapOn: 'All patients'
- waitForAnimationToEnd
- assertVisible: 'All patients'

# -- Go back via header back button --
- tapOn:
    id: 'BackButton'
- waitForAnimationToEnd
- assertVisible: 'Your clients'
- assertVisible: 'All patients'
