appId: host.exp.Exponent
---
# Therapist Tab Navigation
# Navigates through all therapist tabs and verifies each has correct content.

# -- Home --
- tapOn:
    text: '.*Home, tab.*'
- waitForAnimationToEnd
- assertVisible: 'Your clients'
- assertVisible: 'All patients'

# -- Assignments --
- tapOn:
    text: '.*Assignments, tab.*'
- waitForAnimationToEnd
- assertVisible: 'Assignments'
- assertVisible: 'Submissions'

# -- Attempts --
- tapOn:
    text: '.*Attempts, tab.*'
- waitForAnimationToEnd
- assertVisible: 'Attempts'

# -- Programs --
- tapOn:
    text: '.*Programs, tab.*'
- waitForAnimationToEnd
- assertVisible: 'Programs'

# -- Profile --
- tapOn:
    text: '.*Profile, tab.*'
- waitForAnimationToEnd
- assertVisible: 'Log Out'
- assertVisible: 'Patient history'
- assertVisible:
    text: '.*therapist.*'

# -- Return to Home --
- tapOn:
    text: '.*Home, tab.*'
- waitForAnimationToEnd
- assertVisible: 'Your clients'
